name: Daily Profile Sync

on:
  schedule:
    # Run once every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual triggering of the sync

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sync manager repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run sync script
        env:
          TARGET_GITHUB_USERNAME: ${{ secrets.TARGET_GITHUB_USERNAME }}
          TARGET_GITHUB_TOKEN: ${{ secrets.TARGET_GITHUB_TOKEN }}
        run: |
          python sync.py
